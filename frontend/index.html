<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Trader vs Index - 随机交易员大战大盘</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #fbbf24, #f97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        header p {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 20px;
        }

        .panel {
            background: rgba(30, 41, 59, 0.8);
            border-radius: 12px;
            border: 1px solid rgba(148, 163, 184, 0.2);
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .chart-container {
            height: 500px;
            margin-bottom: 20px;
            position: relative;
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .kpi-card {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            border: 1px solid rgba(148, 163, 184, 0.15);
        }

        .kpi-label {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        .kpi-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fbbf24;
        }

        .kpi-value.positive {
            color: #22c55e;
        }

        .kpi-value.negative {
            color: #ef4444;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #f1f5f9;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .param-group {
            margin-bottom: 15px;
        }

        .param-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #cbd5e1;
        }

        input[type="range"],
        input[type="number"] {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 8px;
            background: rgba(15, 23, 42, 0.6);
            color: #e2e8f0;
            font-size: 1rem;
        }

        input[type="range"] {
            padding: 0;
            height: 6px;
            cursor: pointer;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn-primary {
            background: linear-gradient(90deg, #f97316, #fbbf24);
            color: #0f172a;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(251, 191, 36, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: rgba(148, 163, 184, 0.2);
            color: #e2e8f0;
            border: 1px solid rgba(148, 163, 184, 0.3);
        }

        .btn-secondary:hover {
            background: rgba(148, 163, 184, 0.3);
        }

        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .playback-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .playback-controls .btn {
            flex: 1;
            padding: 10px;
        }

        .progress-container {
            margin-top: 15px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(148, 163, 184, 0.2);
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #f97316, #fbbf24);
            width: 0%;
            transition: width 0.1s linear;
        }

        .trades-list {
            max-height: 380px;
            overflow-y: auto;
        }

        .trade-card {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 4px solid #64748b;
            transition: all 0.3s ease;
            opacity: 0.5;
        }

        .trade-card.active {
            opacity: 1;
            transform: scale(1.02);
        }

        .trade-card.buy {
            border-left-color: #22c55e;
        }

        .trade-card.sell {
            border-left-color: #ef4444;
        }

        .trade-card.hold {
            border-left-color: #64748b;
        }

        .trade-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .trade-week {
            font-weight: 600;
            color: #f1f5f9;
        }

        .trade-stock {
            font-size: 0.8rem;
            color: #fbbf24;
            background: rgba(251, 191, 36, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .trade-action {
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
        }

        .trade-action.buy {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }

        .trade-action.sell {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .trade-action.hold {
            background: rgba(100, 116, 139, 0.2);
            color: #94a3b8;
        }

        .trade-details {
            font-size: 0.85rem;
            color: #94a3b8;
        }

        .summary-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .summary-overlay.show {
            display: flex;
        }

        .summary-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            text-align: center;
            border: 2px solid rgba(251, 191, 36, 0.3);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .summary-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 30px;
        }

        .summary-title.win {
            background: linear-gradient(90deg, #22c55e, #4ade80);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .summary-title.lose {
            background: linear-gradient(90deg, #ef4444, #f87171);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .summary-metrics {
            display: grid;
            grid-template-columns: 1fr 1;
            gap: 20px;
            margin-bottom: 30px;
        }

        .summary-metric {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 12px;
            padding: 20px;
        }

        .summary-metric-label {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        .summary-metric-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #fbbf24;
        }

        .confetti {
            position: fixed;
            pointer-events: none;
            z-index: 999;
        }

        @media (max-width: 1200px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎲 Random Trader vs Index</h1>
            <p>随机交易员大战大盘 - 每周随机选股随机买卖，看看能不能跑赢大盘</p>
        </header>

        <div class="main-layout">
            <div class="left-panel">
                <div class="panel">
                    <div class="kpi-grid">
                        <div class="kpi-card">
                            <div class="kpi-label">当前日期</div>
                            <div class="kpi-value" id="current-date">--</div>
                        </div>
                        <div class="kpi-card">
                            <div class="kpi-label">总资产</div>
                            <div class="kpi-value" id="total-equity">¥100,000</div>
                        </div>
                        <div class="kpi-card">
                            <div class="kpi-label">策略收益</div>
                            <div class="kpi-value" id="strategy-return">0.00%</div>
                        </div>
                        <div class="kpi-card">
                            <div class="kpi-label">中证全指收益</div>
                            <div class="kpi-value" id="csi-return">0.00%</div>
                        </div>
                    </div>

                    <div class="chart-container">
                        <canvas id="mainChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="right-panel">
                <div class="panel controls-panel">
                    <div class="section-title">
                        <span>⚙️</span> 策略参数
                    </div>

                    <div class="param-group">
                        <div class="param-label">
                            <span>初始资金</span>
                            <span id="initial-capital-value">100000</span>
                        </div>
                        <input type="number" id="initial-capital" value="100000" min="10000" step="10000">
                    </div>

                    <div class="param-group">
                        <div class="param-label">
                            <span>买入概率</span>
                            <span id="buy-prob-value">40%</span>
                        </div>
                        <input type="range" id="buy-prob" min="0" max="100" value="40">
                    </div>

                    <div class="param-group">
                        <div class="param-label">
                            <span>卖出概率</span>
                            <span id="sell-prob-value">40%</span>
                        </div>
                        <input type="range" id="sell-prob" min="0" max="100" value="40">
                    </div>

                    <div class="param-group">
                        <div class="param-label">
                            <span>持有概率</span>
                            <span id="hold-prob-value">20%</span>
                        </div>
                        <input type="range" id="hold-prob" min="0" max="100" value="20" disabled>
                    </div>

                    <div class="param-group">
                        <div class="param-label">
                            <span>最小仓位比例</span>
                            <span id="min-position-value">20%</span>
                        </div>
                        <input type="range" id="min-position" min="5" max="50" value="20">
                    </div>

                    <div class="param-group">
                        <div class="param-label">
                            <span>最大仓位比例</span>
                            <span id="max-position-value">80%</span>
                        </div>
                        <input type="range" id="max-position" min="50" max="100" value="80">
                    </div>

                    <div class="param-group">
                        <div class="param-label">
                            <span>手续费 (bps)</span>
                            <span id="commission-value">5</span>
                        </div>
                        <input type="number" id="commission" value="5" min="0" step="1">
                    </div>

                    <div class="param-group">
                        <div class="param-label">
                            <span>随机种子 (可选)</span>
                        </div>
                        <input type="number" id="seed" placeholder="留空则随机">
                    </div>

                    <button class="btn btn-primary" id="run-btn" onclick="runStrategy()">
                        🚀 开始模拟
                    </button>

                    <div style="margin-top: 30px;">
                        <div class="section-title">
                            <span>▶️</span> 播放控制
                        </div>

                        <div class="playback-controls">
                            <button class="btn btn-secondary" id="prev-btn" onclick="prevWeek()" disabled>⏮️</button>
                            <button class="btn btn-primary" id="play-btn" onclick="togglePlay()" disabled>▶️</button>
                            <button class="btn btn-secondary" id="next-btn" onclick="nextWeek()" disabled>⏭️</button>
                        </div>

                        <div class="param-group">
                            <div class="param-label">
                                <span>播放速度</span>
                                <span id="speed-value">1x</span>
                            </div>
                            <input type="range" id="speed" min="0.5" max="4" step="0.5" value="1">
                        </div>

                        <div class="progress-container">
                            <div class="progress-bar" id="progress-bar" onclick="seekTo(event)">
                                <div class="progress-fill" id="progress-fill"></div>
                            </div>
                        </div>
                    </div>

                    <div style="margin-top: 30px;">
                        <div class="section-title">
                            <span>📜</span> 交易记录
                        </div>
                        <div class="trades-list" id="trades-list">
                            <div style="text-align: center; color: #64748b; padding: 40px;">
                                先运行模拟来查看交易记录
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="summary-overlay" id="summary-overlay">
        <div class="summary-card">
            <div class="summary-title" id="summary-title">你跑赢了吗？</div>
            <div class="summary-metrics">
                <div class="summary-metric">
                    <div class="summary-metric-label">策略总收益</div>
                    <div class="summary-metric-value" id="summary-strategy-return">0.00%</div>
                </div>
                <div class="summary-metric">
                    <div class="summary-metric-label">中证全指收益</div>
                    <div class="summary-metric-value" id="summary-csi-return">0.00%</div>
                </div>
                <div class="summary-metric">
                    <div class="summary-metric-label">等权指数收益</div>
                    <div class="summary-metric-value" id="summary-equal-return">0.00%</div>
                </div>
                <div class="summary-metric">
                    <div class="summary-metric-label">策略年化</div>
                    <div class="summary-metric-value" id="summary-annualized">0.00%</div>
                </div>
                <div class="summary-metric">
                    <div class="summary-metric-label">最大回撤</div>
                    <div class="summary-metric-value" id="summary-mdd">0.00%</div>
                </div>
            </div>
            <button class="btn btn-primary" onclick="closeSummary()">继续探索</button>
        </div>
    </div>

    <script>
        let chart = null;
        let data = null;
        let currentWeekIndex = 0;
        let isPlaying = false;
        let animationId = null;
        let playbackSpeed = 1;
        let currentDayIndex = 0;

        function initChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            
            if (chart) {
                chart.destroy();
            }

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        {
                            label: '随机策略',
                            data: [],
                            borderColor: '#60a5fa',
                            backgroundColor: 'rgba(96, 165, 250, 0.1)',
                            borderWidth: 2,
                            pointRadius: 0,
                            yAxisID: 'y',
                            fill: false
                        },
                        {
                            label: '中证全指',
                            data: [],
                            borderColor: '#ef4444',
                            backgroundColor: 'rgba(239, 68, 68, 0.1)',
                            borderWidth: 2,
                            pointRadius: 0,
                            yAxisID: 'y',
                            fill: false
                        },
                        {
                            label: '市场等权',
                            data: [],
                            borderColor: '#f97316',
                            backgroundColor: 'rgba(249, 115, 22, 0.1)',
                            borderWidth: 2,
                            pointRadius: 0,
                            yAxisID: 'y',
                            fill: false
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        legend: {
                            labels: {
                                color: '#94a3b8'
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                color: 'rgba(148, 163, 184, 0.1)'
                            },
                            ticks: {
                                color: '#94a3b8',
                                maxTicksLimit: 10
                            }
                        },
                        y: {
                            type: 'linear',
                            display: true,
                            position: 'left',
                            grid: {
                                color: 'rgba(148, 163, 184, 0.1)'
                            },
                            ticks: {
                                color: '#94a3b8'
                            }
                        }
                    }
                }
            });
        }

        function updateProbDisplay() {
            const buyProb = parseInt(document.getElementById('buy-prob').value);
            const sellProb = parseInt(document.getElementById('sell-prob').value);
            const holdProb = 100 - buyProb - sellProb;
            
            document.getElementById('buy-prob-value').textContent = buyProb + '%';
            document.getElementById('sell-prob-value').textContent = sellProb + '%';
            document.getElementById('hold-prob-value').textContent = holdProb + '%';
            document.getElementById('hold-prob').value = holdProb;
            
            document.getElementById('min-position-value').textContent = document.getElementById('min-position').value + '%';
            document.getElementById('max-position-value').textContent = document.getElementById('max-position').value + '%';
            document.getElementById('initial-capital-value').textContent = document.getElementById('initial-capital').value;
            document.getElementById('commission-value').textContent = document.getElementById('commission').value;
            document.getElementById('speed-value').textContent = document.getElementById('speed').value + 'x';
        }

        document.getElementById('buy-prob').addEventListener('input', updateProbDisplay);
        document.getElementById('sell-prob').addEventListener('input', updateProbDisplay);
        document.getElementById('min-position').addEventListener('input', updateProbDisplay);
        document.getElementById('max-position').addEventListener('input', updateProbDisplay);
        document.getElementById('initial-capital').addEventListener('input', updateProbDisplay);
        document.getElementById('commission').addEventListener('input', updateProbDisplay);
        document.getElementById('speed').addEventListener('input', function() {
            playbackSpeed = parseFloat(this.value);
            updateProbDisplay();
        });

        async function runStrategy() {
            const btn = document.getElementById('run-btn');
            btn.disabled = true;
            btn.textContent = '⏳ 运行中...';

            if (isPlaying) {
                isPlaying = false;
                if (animationId) cancelAnimationFrame(animationId);
            }

            const initialCapital = parseFloat(document.getElementById('initial-capital').value);
            const buyProb = parseInt(document.getElementById('buy-prob').value) / 100;
            const sellProb = parseInt(document.getElementById('sell-prob').value) / 100;
            const holdProb = 1 - buyProb - sellProb;
            const minPositionRatio = parseInt(document.getElementById('min-position').value) / 100;
            const maxPositionRatio = parseInt(document.getElementById('max-position').value) / 100;
            const commission = parseInt(document.getElementById('commission').value);
            const seed = document.getElementById('seed').value;

            try {
                const response = await fetch('/api/run-strategy', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        initial_capital: initialCapital,
                        buy_prob: buyProb,
                        sell_prob: sellProb,
                        hold_prob: holdProb,
                        min_position_ratio: minPositionRatio,
                        max_position_ratio: maxPositionRatio,
                        commission_bps: commission,
                        seed: seed ? parseInt(seed) : null
                    })
                });

                const result = await response.json();
                
                if (result.success) {
                    data = result.data;
                    currentDayIndex = 0;
                    currentWeekIndex = 0;
                    
                    initChart();
                    renderTradesList();
                    updateUI(0);
                    
                    document.getElementById('play-btn').disabled = false;
                    document.getElementById('prev-btn').disabled = false;
                    document.getElementById('next-btn').disabled = false;
                }
            } catch (error) {
                console.error('Error:', error);
                alert('运行策略失败: ' + error.message);
            }

            btn.disabled = false;
            btn.textContent = '🚀 开始模拟';
        }

        function renderTradesList() {
            const container = document.getElementById('trades-list');
            container.innerHTML = '';

            data.trades.forEach((trade, index) => {
                const card = document.createElement('div');
                card.className = `trade-card ${trade.action.toLowerCase()}`;
                card.id = `trade-${index}`;

                const actionClass = trade.action.toLowerCase();
                const sharesText = trade.shares > 0 ? `${trade.shares}股` : '-';
                const positionText = trade.position_ratio > 0 ? `仓位: ${(trade.position_ratio * 100).toFixed(0)}%` : '';

                card.innerHTML = `
                    <div class="trade-header">
                        <div style="display: flex; flex-direction: column; gap: 4px;">
                            <span class="trade-week">${trade.week}</span>
                            <span class="trade-stock">${trade.stock}</span>
                        </div>
                        <span class="trade-action ${actionClass}">${trade.action}</span>
                    </div>
                    <div class="trade-details">
                        价格: ¥${trade.price.toFixed(2)} | ${sharesText}<br>
                        ${positionText}
                        权益: ¥${trade.equity.toLocaleString('zh-CN', { maximumFractionDigits: 0 })}
                    </div>
                `;

                container.appendChild(card);
            });
        }

        function findTradeIndexForDate(date) {
            for (let i = 0; i < data.trades.length; i++) {
                if (data.trades[i].t >= date) {
                    return i;
                }
            }
            return data.trades.length - 1;
        }

        function updateUI(dayIndex) {
            if (!data) return;

            const candle = data.candles[dayIndex];
            const equityPoint = data.equity[dayIndex];
            const csiPoint = data.csi_all[dayIndex];
            const equalPoint = data.market_equal_weight[dayIndex];

            const date = new Date(candle.t);
            document.getElementById('current-date').textContent = date.toLocaleDateString('zh-CN');

            const strategyReturn = ((equityPoint.v / data.metrics.initial_capital) - 1) * 100;
            const csiReturn = ((csiPoint.v / data.metrics.initial_capital) - 1) * 100;

            document.getElementById('total-equity').textContent = '¥' + equityPoint.v.toLocaleString('zh-CN', { maximumFractionDigits: 0 });
            
            const strategyReturnEl = document.getElementById('strategy-return');
            strategyReturnEl.textContent = (strategyReturn >= 0 ? '+' : '') + strategyReturn.toFixed(2) + '%';
            strategyReturnEl.className = 'kpi-value ' + (strategyReturn >= 0 ? 'positive' : 'negative');

            const csiReturnEl = document.getElementById('csi-return');
            csiReturnEl.textContent = (csiReturn >= 0 ? '+' : '') + csiReturn.toFixed(2) + '%';
            csiReturnEl.className = 'kpi-value ' + (csiReturn >= 0 ? 'positive' : 'negative');

            const progress = (dayIndex / (data.candles.length - 1)) * 100;
            document.getElementById('progress-fill').style.width = progress + '%';

            const weekIndex = findTradeIndexForDate(candle.t);
            if (weekIndex !== currentWeekIndex) {
                if (currentWeekIndex >= 0) {
                    const prevCard = document.getElementById(`trade-${currentWeekIndex}`);
                    if (prevCard) prevCard.classList.remove('active');
                }
                currentWeekIndex = weekIndex;
                const currentCard = document.getElementById(`trade-${currentWeekIndex}`);
                if (currentCard) {
                    currentCard.classList.add('active');
                }
            }

            const visibleLabels = data.candles.slice(0, dayIndex + 1).map(c => new Date(c.t).toLocaleDateString('zh-CN'));
            const visibleStrategy = data.equity.slice(0, dayIndex + 1).map(e => e.v);
            const visibleCsi = data.csi_all.slice(0, dayIndex + 1).map(e => e.v);
            const visibleEqual = data.market_equal_weight.slice(0, dayIndex + 1).map(e => e.v);

            chart.data.labels = visibleLabels;
            chart.data.datasets[0].data = visibleStrategy;
            chart.data.datasets[1].data = visibleCsi;
            chart.data.datasets[2].data = visibleEqual;
            chart.update('none');
        }

        let lastTimestamp = 0;

        function animate(timestamp) {
            if (!lastTimestamp) lastTimestamp = timestamp;
            const delta = timestamp - lastTimestamp;
            lastTimestamp = timestamp;

            const daysToAdvance = Math.max(1, Math.floor((delta / 1000) * playbackSpeed * 5));
            currentDayIndex = Math.min(currentDayIndex + daysToAdvance, data.candles.length - 1);

            updateUI(currentDayIndex);

            if (currentDayIndex < data.candles.length - 1) {
                animationId = requestAnimationFrame(animate);
            } else {
                isPlaying = false;
                document.getElementById('play-btn').textContent = '▶️';
                showSummary();
            }
        }

        function togglePlay() {
            if (!data) return;

            if (isPlaying) {
                isPlaying = false;
                if (animationId) cancelAnimationFrame(animationId);
                document.getElementById('play-btn').textContent = '▶️';
            } else {
                if (currentDayIndex >= data.candles.length - 1) {
                    currentDayIndex = 0;
                    currentWeekIndex = 0;
                    data.trades.forEach((_, i) => {
                        const card = document.getElementById(`trade-${i}`);
                        if (card) card.classList.remove('active');
                    });
                }
                isPlaying = true;
                document.getElementById('play-btn').textContent = '⏸️';
                lastTimestamp = 0;
                animationId = requestAnimationFrame(animate);
            }
        }

        function prevWeek() {
            if (!data) return;
            currentDayIndex = Math.max(0, currentDayIndex - 5);
            updateUI(currentDayIndex);
        }

        function nextWeek() {
            if (!data) return;
            currentDayIndex = Math.min(data.candles.length - 1, currentDayIndex + 5);
            updateUI(currentDayIndex);
        }

        function seekTo(event) {
            if (!data) return;
            const bar = document.getElementById('progress-bar');
            const rect = bar.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const ratio = x / rect.width;
            currentDayIndex = Math.floor(ratio * (data.candles.length - 1));
            updateUI(currentDayIndex);
        }

        function showSummary() {
            const overlay = document.getElementById('summary-overlay');
            const title = document.getElementById('summary-title');

            if (data.metrics.outperform) {
                title.textContent = '🎉 恭喜！你跑赢了中证全指！';
                title.className = 'summary-title win';
                createConfetti();
            } else {
                title.textContent = '😅 哎呀，跑输中证全指了...';
                title.className = 'summary-title lose';
            }

            document.getElementById('summary-strategy-return').textContent = (data.metrics.total_return * 100).toFixed(2) + '%';
            document.getElementById('summary-csi-return').textContent = (data.metrics.benchmark_total_return * 100).toFixed(2) + '%';
            
            const equalReturn = ((data.market_equal_weight[data.market_equal_weight.length - 1].v / data.metrics.initial_capital) - 1) * 100;
            document.getElementById('summary-equal-return').textContent = (equalReturn >= 0 ? '+' : '') + equalReturn.toFixed(2) + '%';
            
            document.getElementById('summary-annualized').textContent = (data.metrics.annualized_return * 100).toFixed(2) + '%';
            document.getElementById('summary-mdd').textContent = (data.metrics.max_drawdown * 100).toFixed(2) + '%';

            overlay.classList.add('show');
        }

        function closeSummary() {
            document.getElementById('summary-overlay').classList.remove('show');
        }

        function createConfetti() {
            const colors = ['#fbbf24', '#f97316', '#22c55e', '#60a5fa', '#a855f7'];
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.top = '-20px';
                    confetti.style.width = '10px';
                    confetti.style.height = '10px';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                    document.body.appendChild(confetti);

                    const animation = confetti.animate([
                        { transform: 'translateY(0) rotate(0deg)', opacity: 1 },
                        { transform: `translateY(100vh) rotate(${Math.random() * 720}deg)`, opacity: 0 }
                    ], {
                        duration: 2000 + Math.random() * 2000,
                        easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)'
                    });

                    animation.onfinish = () => confetti.remove();
                }, i * 50);
            }
        }

        initChart();
        updateProbDisplay();
    </script>
</body>
</html>
